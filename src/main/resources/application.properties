spring.jpa.hibernate.ddl-auto=create
spring.datasource.username=root
spring.datasource.url=jdbc:mysql://localhost:3306/smart_lockers_new_lear?serverTimezone=CET
spring.datasource.password=Admin1234$
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

##MULTIPART (MultipartProperties)
#Enable multipart uploads
spring.servlet.multipart.enabled=true
# Threshold after which files are written to disk.
spring.servlet.multipart.file-size-threshold=2KB
# Max file size.
spring.servlet.multipart.max-file-size=200MB
# Max Request Size
spring.servlet.multipart.max-request-size=215MB
## File Storage Properties
# All files uploaded throguh the REST API will be stored in this directory
file.upload-dir=C:/uploads
##ValidationMessages
pl.bratosz.smartlockers.CorrectFirstName.message=The given first name is incorrect, it contains numbers or forbidden symbols
pl.bratosz.smartlockers.CorrectLastName.message=The given last name is incorrect, it contains numbers, spaces or forbidden symbols
        