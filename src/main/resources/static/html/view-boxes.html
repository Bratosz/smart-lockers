<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SL - Boxy</title>
    <script src="../js/jquery-3.3.1.min.js"></script>
    <script src="../js/smart-lockers.js"></script>
    <script src="../js/table-manager.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/boxes-manager.js"></script>
    <script src="../js/employees-manager.js"></script>
    <script src="../js/view-boxes.js" defer></script>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
          crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
            integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
            crossorigin="anonymous"></script>

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
            integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
            crossorigin="anonymous"></script>

</head>
<body>


<div class="container">
    <div class="headerRow mx-lg-n5">
        <div class="col-lg-2">
            <img src="../kls_logo.jpg" class="img-fluid" alt="Responsive image">
        </div>
        <div class="col-lg-6"></div>
        <div class="col py-3 px-lg-2">
            <h3>Username</h3>
        </div>
        <div class="col py-3 px-lg-2">
            <button type="button" class="btn btn-secondary">Wyloguj</button>
        </div>
    </div>
    <br>

    <!--Nav bar-->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarText"
                aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item actionToDo">
                    <a class="nav-link" href="view-lockers.html">Szafy</a>
                </li>
                <li class="nav-item actionToDo">
                    <a class="nav-link" href="view-boxes.html">Boxy</a>
                </li>
                <li class="nav-item actionToDo">
                    <a class="nav-link" href="add-lockers.html">Dodaj szafy</a>
                </li>
                <li class="nav-item actionToDo">
                    <a class="nav-link" href="add-employees.html">Dodaj pracowników</span></a>
                </li>
                <li class="nav-item actionToDo">
                    <a class="nav-link" href="edit-departments.html">Oddziały</span></a>
                </li>
                <li class="nav-item actionToDo">
                    <a class="nav-link" href="clothing-acceptance.html">Przyjęcie odzieży</span></a>
                </li>
            </ul>
            <span class="navbar-text"></span>
        </div>
    </nav>

    <br>

    <!--Form-->
    <!--Input lastname-->
    <div class="headerRow">
        <div class="col-lg-4">
            <form class="form-inline">
                <div class="form-group">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" placeholder="Nazwisko" aria-label="Nazwisko"
                               aria-describedby="input-lastName" id="input-lastname">
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary" type="button" id="button-input-lastname">Szukaj
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <!--Input first name-->
    <div class="headerRow">
        <div class="col-lg-4">
            <form class="form-inline">
                <div class="form-group">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" placeholder="Imię" aria-label="Imię"
                               aria-describedby="input-first-name" id="input-first-name">
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary" type="button" id="button-input-first-name">Szukaj
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <!--Input locker number-->
    <div class="headerRow">
        <div class="col-lg-4">
            <form class="form-inline">
                <div class="form-group">
                    <div class="input-group mb-3">
                        <input type="text" id="input-locker-number" class="form-control"
                               placeholder="Numer szafki">
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary" type="button"
                                    id="button-get-lockers-by-number">Szukaj
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <!--Filtering-->
    <div class="headerRow">
        <div class="col-lg-4">
            <form class="form-inline">
                <div class="form-group">
                    <select class="form-control" id="select-plant"></select>
                    <select class="form-control" id="select-department"></select>
                    <select class="form-control" id="select-location"></select>
                    <select class="form-control" id="select-box-status">
                        <option value="ALL">Status szafki</option>
                        <option value="OCCUPY">Zajęta</option>
                        <option value="FREE">Wolna</option>
                    </select>
                    <button type="button" class="btn btn-primary" id="button-filter">Filtruj</button>
                </div>
            </form>
        </div>
    </div>

    <br>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Imię</th>
            <th>Nazwisko</th>
            <th>Szafa</th>
            <th>Box</th>
            <th>Numer zakładu</th>
            <th>Oddział</th>
            <th>Lokalizacja</th>
            <th>Status</th>
            <th></th>
        </tr>
        </thead>
        <tbody id="table-of-boxes">
        <tr id="row-template" style="display: none">
            <td class="cell-id"></td>
            <td class="cell-first-name"></td>
            <td class="cell-last-name"></td>
            <td class="cell-locker"></td>
            <td class="cell-box-number"></td>
            <td class="cell-plant-number"></td>
            <td class="cell-department"></td>
            <td class="cell-location"></td>
            <td class="cell-status"></td>
            <td><input type="button" value="pokaż" class="button-view-employee"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>

</html>
