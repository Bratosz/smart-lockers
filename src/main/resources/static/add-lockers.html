<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SL - dodawanie szafek</title>
    <script src="jquery-3.3.1.min.js"></script>
    <script src="add-lockers.js" defer></script>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
          crossorigin="anonymous">
    <!--<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"-->
    <!--integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"-->
    <!--crossorigin="anonymous"></script>-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
            integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
            crossorigin="anonymous"></script>

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
            integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
            crossorigin="anonymous"></script>

</head>
<body>

<div class="container">
    <div class="row mx-lg-n5">
        <div class="col-lg-2">
            <img src="kls_logo.jpg" class="img-fluid" alt="Responsive image">
        </div>
        <div class="col-lg-6"></div>
        <div class="col py-3 px-lg-2">
            <h3>Username</h3>
        </div>
        <div class="col py-3 px-lg-2">
            <button type="button" class="btn btn-secondary">Wyloguj</button>
        </div>
    </div>
    <br>

    <!--Nav bar-->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarText"
                aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="index.html">Wyszukaj <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="add-lockers.html">Dodaj szafki <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="add-employees.html">Dodaj pracowników </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="orders.html">Zamówienia <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Raporty </a>
                </li>
            </ul>
            <span class="navbar-text"></span>
        </div>
    </nav>

    <br>

    <!--Add box-->
    <div class="row">
        <div class="col-lg-4">
            <form class="form">
                <div class="form-group">
                    <input type="number" class="form-control" placeholder="Ilość szafek" id="locker-amount-input">
                </div>
                <div class="form-group">
                    <select class="form-control" id="pass-locker-capacity">
                        <option value="null">Pojemność</option>
                        <option value="10">10</option>
                        <option value="20">20</option>
                    </select>
                </div>
                <div class="form-group">
                    <select class="form-control" id="pass-locker-department-no">
                        <option value="null">Numer oddziału</option>
                        <option value="DEP_384">384</option>
                        <option value="DEP_385">385</option>
                        <option value="DEP_386">386</option>
                    </select>
                </div>
                <div class="form-group">
                    <select class="form-control" id="pass-locker-department">
                        <option value="null">Oddział</option>
                        <option value="METAL">Structures</option>
                        <option value="JIT">Jit</option>
                        <option value="COMMON">Wspólny</option>
                    </select>
                </div>
                <div class="form-group">
                    <select class="form-control" id="pass-locker-location">
                        <option value="null">Lokalizacja</option>
                        <option value="OLDSIDE">Stara hala</option>
                        <option value="NEWSIDE">Nowa hala</option>
                        <option value="MANTRANS">Mantrans</option>
                    </select>
                </div>
                <button type="button" class="btn btn-primary" id="button-add-locker">Dodaj</button>
            </form>
        </div>
    </div>
</div>


</body>
</html>
